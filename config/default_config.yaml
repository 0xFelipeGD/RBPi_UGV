# UGV On-Board Software — Default Configuration
# Copy config.yaml.example to config.yaml and edit for your setup.

mqtt:
  host: "localhost"
  port: 8883
  username: ""
  password: ""
  tls:
    enabled: true
    ca_certs: ""
    certfile: ""
    keyfile: ""
  client_id: "ugv-onboard"
  keepalive: 30
  qos_control: 0
  qos_telemetry: 1

  # Monitor credentials — required by monitor.py to subscribe to ugv/pong and ugv/telemetry
  # (ugv_client ACL only allows write on those topics, not read)
  rcs_username: "rcs_operator"
  rcs_password: ""              # Set in config.yaml with the rcs_operator password from broker setup

topics:
  joystick_control: "ugv/joystick"
  heartbeat: "ugv/heartbeat"
  telemetry: "ugv/telemetry"
  latency_ping: "ugv/ping"
  latency_pong: "ugv/pong"
  camera_cmd: "ugv/camera/cmd"
  camera_offer: "ugv/camera/offer"
  camera_answer: "ugv/camera/answer"
  camera_ice_ugv: "ugv/camera/ice/ugv"
  camera_ice_rcs: "ugv/camera/ice/rcs"
  camera_status: "ugv/camera/status"

drive:
  mode: "arcade" # "arcade" or "tank"

  # Arcade mode mapping (stick axes)
  arcade:
    speed_axis: "1" # Stick Y axis (evdev code as string)
    steer_axis: "0" # Stick X axis (evdev code as string)
    speed_source: "stick" # "stick" or "throttle"
    steer_source: "stick" # "stick" or "throttle"
    max_speed: 1.0 # Scale factor (0.0-1.0)
    steer_sensitivity: 0.7 # Steering mix ratio (0.0-1.0)
    invert_speed: false # True if pushing stick forward gives negative values
    invert_steer: false

  # Tank mode mapping (throttle axes)
  tank:
    left_axis: "2" # Left throttle (evdev code as string)
    right_axis: "5" # Right throttle (evdev code as string)
    left_source: "throttle" # "stick" or "throttle"
    right_source: "throttle"
    invert_left: false
    invert_right: false

  # Motor output backend
  backend: "gpio_pwm" # "gpio_pwm", "pca9685", or "serial_plc"

  # GPIO PWM backend config
  gpio_pwm:
    left_pin: 18 # BCM pin number for left motor PWM
    right_pin: 19 # BCM pin number for right motor PWM
    left_dir_pin: 23 # BCM pin for left motor direction (HIGH=forward)
    right_dir_pin: 24 # BCM pin for right motor direction
    frequency: 1000 # PWM frequency in Hz
    min_duty: 0 # Minimum duty cycle (0-100)
    max_duty: 100 # Maximum duty cycle (0-100)

  # PCA9685 I2C backend config
  pca9685:
    i2c_address: 0x40
    left_channel: 0
    right_channel: 1
    frequency: 50 # For standard servo ESCs
    min_pulse_us: 1000 # Full reverse
    center_pulse_us: 1500 # Neutral
    max_pulse_us: 2000 # Full forward

  # Serial PLC backend config
  serial_plc:
    port: "/dev/ttyUSB0"
    baudrate: 115200
    protocol: "json" # "json" or "modbus"
    timeout: 0.1

  # Ramp rate limiter (safety: prevents instant full-speed jumps)
  ramp_rate: 2.0 # Max change per second (1.0 = 0->full in 1s)

safety:
  heartbeat_timeout: 3.0 # Seconds without heartbeat before E-stop
  estop_pin: 25 # BCM pin for E-stop relay (active LOW = engaged)
  startup_armed: false # If false, waits for first heartbeat before arming
  ramp_down_time: 0.5 # Seconds to ramp motors to zero on E-stop

sensors:
  battery:
    enabled: true
    backend: "ads1115" # "ads1115", "mcp3008", or "mock"
    i2c_address: 0x48 # ADS1115 I2C address
    channel: 0 # ADC channel
    voltage_divider_ratio: 4.0 # R1+R2/R2 (e.g., 30K+10K = 4.0 for 0-16.8V -> 0-4.2V)
    poll_interval: 0.5 # Seconds between reads
    cell_count: 4 # Battery cell count (for SOC estimation)
    cell_min_v: 3.0 # Minimum cell voltage (0% SOC)
    cell_max_v: 4.2 # Maximum cell voltage (100% SOC)

  temperature:
    enabled: true
    backend: "ds18b20" # "ds18b20" (1-Wire) or "mock"
    left_sensor_id: "" # 1-Wire ROM ID (auto-detect if empty)
    right_sensor_id: ""
    poll_interval: 1.0

  gps:
    enabled: false
    port: "/dev/ttyAMA0" # UART port for GPS module
    baudrate: 9600
    poll_interval: 1.0

telemetry:
  publish_rate_hz: 2 # Telemetry publish rate to MQTT

camera:
  enabled: true
  resolution: [1280, 720]
  framerate: 30
  stun_servers:
    - "stun:72.60.132.162:3478"
  turn_servers:
    - url: "turn:72.60.132.162:3478"
      username: "ugv"
      credential: "ugvturn2026"

  # NoIR (no infrared cut filter) color correction tuning.
  #
  # The Pi Camera Module 3 NoIR has no IR cut filter on the sensor. Under
  # normal indoor lighting (LED, fluorescent, mixed daylight), the
  # infrared component of the light bleeds into all three RGB channels,
  # making whites look pinkish, dark colors look purple/blue, and skin
  # tones look off. picamera2 / libcamera expose AWB mode, manual color
  # gains, and a full 3x3 color correction matrix -- these controls let
  # us compensate in software without needing to install a physical IR
  # cut filter on the lens.
  #
  # The defaults below are a sensible starting point for NoIR under
  # typical indoor LED + fluorescent lighting. If the colors still look
  # off for YOUR lighting, tune them:
  #
  #   1. Try a different awb_mode first. libcamera AwbMode integer values:
  #        0 = Auto           (often wrong for NoIR -- picks bad gains)
  #        1 = Incandescent   (warm indoor light, good default for NoIR)
  #        2 = Tungsten       (very warm, older bulbs)
  #        3 = Fluorescent    (cool white fluorescent)
  #        4 = Indoor         (general indoor, similar to fluorescent)
  #        5 = Daylight       (bright outdoor)
  #        6 = Cloudy         (diffuse outdoor)
  #        7 = Custom         (use with colour_correction_matrix below)
  #
  #   2. If awb_mode alone is not enough, set colour_gains to fixed
  #      [red, blue] values. This DISABLES auto white balance. Typical
  #      values for NoIR under warm indoor light: [1.0, 1.8] or [0.9, 2.0].
  #      Lower red and higher blue compensate for the IR bleed into the
  #      red channel.
  #
  #   3. For extreme cases (very purple darks, very pink whites), fill in
  #      colour_correction_matrix with a custom 9-element (row-major 3x3)
  #      matrix that subtracts IR component from each RGB channel. Expert
  #      tuning -- leave at null unless you know what you are doing.
  #
  # If you have a physical IR cut filter installed on the lens
  # (recommended hardware fix, ~US$10 on AliExpress), set `enabled: false`
  # below and picamera2 will use its default color pipeline.
  noir_color_correction:
    enabled: true
    # AWB mode: start with Incandescent (1) which works well for NoIR
    # under warm indoor lighting. If your room is lit with daylight
    # LEDs or cool fluorescent, try Fluorescent (3) or Indoor (4).
    awb_mode: 1
    # Manual [red_gain, blue_gain]. If set, disables AWB entirely.
    # Leave null to use awb_mode with automatic gain adjustment.
    colour_gains: null
    # Custom 3x3 color correction matrix as a 9-element row-major list.
    # Only set this if awb_mode + colour_gains are not enough for your
    # lighting. Example that subtracts IR from R and compensates:
    #   [1.6, -0.3, -0.3, -0.3, 1.5, -0.2, -0.3, -0.2, 1.5]
    colour_correction_matrix: null

logging:
  level: "INFO"
  file: "/var/log/ugv/ugv.log"
  console: true
  max_bytes: 5242880 # 5 MB log rotation
  backup_count: 3

# ── Local Mode (LAN-direct transport — see spec §8.2) ────────────────────────
local_mode:
  enabled: false                    # set true by setup.sh "Local Mode setup"
  mqtt:
    bind_host: "0.0.0.0"
    bind_port: 8883
    cert_path: "/etc/mosquitto/certs/server.crt"
    key_path: "/etc/mosquitto/certs/server.key"
    ca_path: "/etc/mosquitto/certs/ca.crt"
  mdns:
    hostname: "ugv-rover-01"        # set by setup.sh
    service_type: "_ugv._tcp"
  video:
    enabled: true                   # MJPEG server runs only when local_mode.enabled
    bind_host: "0.0.0.0"
    bind_port: 8443
    endpoint_path: "/stream.mjpg"
    auth_username: "rcs_operator"
    cert_path: "/etc/mosquitto/certs/server.crt"
    key_path: "/etc/mosquitto/certs/server.key"
    mjpeg:
      width: 1920
      height: 1080
      fps: 30
      jpeg_quality: 85
      tcp_nodelay: true
